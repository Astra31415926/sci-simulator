<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SCI Simulator — проста версія</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f4f8;
            text-align: center;
        }
        .zone {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 12px;
            border: 2px solid #333;
        }
        input {
            width: 100%;
            margin: 20px 0;
        }
        .diff {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<h1>SCI Simulator</h1>
<p>Рухай повзунок → дивись, як змінюються квадрати</p>

<div>
    <div class="zone" id="zoneA" style="background-color: rgb(50, 100, 200);"></div>
    <div class="zone" id="zoneB" style="background-color: rgb(200, 80, 50);"></div>
</div>

<input type="range" id="slider" min="400" max="700" value="540" step="5">

<div class="diff">
    Різниця (ΔI): <span id="diff">0.0000</span>
</div>

<p><strong>540 нм</strong> — квадрати однакові за яскравістю (злиття)</p>

<script>
    const slider = document.getElementById('slider');
    const diffSpan = document.getElementById('diff');
    const zoneA = document.getElementById('zoneA');
    const zoneB = document.getElementById('zoneB');

    function update() {
        let wl = Number(slider.value);
        
        // Яскравість зони A: максимальна при 450 нм, мінімальна при 700
        let brightnessA = 1 - Math.abs(wl - 450) / 300;
        brightnessA = Math.min(1, Math.max(0.2, brightnessA));
        
        // Яскравість зони B: максимальна при 620 нм, мінімальна при 450
        let brightnessB = 1 - Math.abs(wl - 620) / 300;
        brightnessB = Math.min(1, Math.max(0.2, brightnessB));
        
        // Робимо їх рівними при 540 нм
        if (wl >= 530 && wl <= 550) {
            brightnessA = 0.7;
            brightnessB = 0.7;
        }
        
        // Змінюємо яскравість (додаємо білого або чорного)
        zoneA.style.backgroundColor = `rgb(${50 + brightnessA * 50}, ${100 + brightnessA * 80}, ${200 - brightnessA * 50})`;
        zoneB.style.backgroundColor = `rgb(${200 - brightnessB * 50}, ${80 + brightnessB * 60}, ${50 + brightnessB * 30})`;
        
        // Різниця
        let diff = Math.abs(brightnessA - brightnessB);
        diffSpan.textContent = diff.toFixed(4);
        
        if (diff < 0.05) {
            diffSpan.style.color = "green";
        } else {
            diffSpan.style.color = "red";
        }
    }

    slider.addEventListener('input', update);
    update();
</script>

</body>
</html>
